<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Configuração básica -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Título -->
  <title>NeuroInovaMente | Painel dos Pais</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Cabeçalho -->
  <header class="topo">
    <div class="container nav">
      <div class="logo">NeuroInovaMente</div>

      <!-- Menu -->
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <!-- Conteúdo -->
  <main class="secao">
    <div class="container">

      <div class="painel-pais">

        <!-- Cabeçalho -->
        <div class="painel-cabecalho">
          <div>
            <span class="tag tag-pequena">Acompanhamento mensal</span>
            <h4 id="titulo-familia">Olá, família</h4>
            <p id="subtitulo-painel">Acompanhe abaixo o desenvolvimento do aluno.</p>
          </div>

          <!-- Botão -->
          <a href="#" id="btn-ver-relatorio" class="btn btn-primario">Ver relatório completo</a>
        </div>

        <!-- Cards -->
        <div class="pais-grid">
          <div class="pais-card">
            <span>Aluno</span>
            <strong id="card-aluno">-</strong>
          </div>

          <div class="pais-card">
            <span>Turma</span>
            <strong id="card-turma">-</strong>
          </div>

          <div class="pais-card">
            <span>Status</span>
            <strong id="card-status">-</strong>
          </div>
        </div>

        <!-- Gráficos -->
        <div class="graficos-grid">

          <div class="grafico-card">
            <h5>Presença</h5>
            <canvas id="grafico-presenca-pais"></canvas>
          </div>

          <div class="grafico-card">
            <h5>Evolução do Desenvolvimento</h5>
            <canvas id="grafico-desenvolvimento-pais"></canvas>
          </div>

        </div>

        <!-- Texto -->
        <div class="texto-relatorio">
          <h5>Resumo automático</h5>
          <p id="resumo-pais">Carregando informações do aluno...</p>
        </div>

      </div>
    </div>
  </main>

  <!-- Bibliotecas -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Script -->
  <script type="module" src="js/firebase-pais.js"></script>
</body>
</html>
