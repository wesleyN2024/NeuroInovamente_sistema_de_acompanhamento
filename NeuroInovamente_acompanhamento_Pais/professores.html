<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Define a codificação de caracteres da página -->
  <meta charset="UTF-8" />
  
  <!-- Faz a página se adaptar corretamente em diferentes tamanhos de tela -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <!-- Título exibido na aba do navegador -->
  <title>NeuroInovaMente| Usuários Autorizados</title>
  
  <!-- Importa o arquivo de estilos CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Cabeçalho principal do site -->
  <header class="topo">
    <div class="container nav">
      
      <!-- Logo ou nome do sistema -->
      <div class="logo">NeuroInovaMente</div>
      
      <!-- Menu de navegação -->
      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="dashboard-coordenacao.html">Coordenação</a>
        <a href="alunos.html">Alunos</a>
        <a href="relatorio.html">Relatório</a>
      </nav>
    </div>
  </header>

  <!-- Conteúdo principal da página -->
  <main class="secao">
    <div class="container">
      
      <!-- Título e descrição do módulo -->
      <div class="modulo-topo">
        <span class="tag">Coordenação</span>
        <h2>Cadastro de Usuários Autorizados</h2>
        <p>Área exclusiva da coordenação para autorizar professores, coordenação e responsáveis no sistema.</p>
      </div>

      <!-- Painel com formulário de cadastro -->
      <div class="painel-pais">
        <form class="form-cadastro" id="form-professor">
          
          <!-- Linha com nome completo e função -->
          <div class="linha-campos">
            <div>
              <label for="nome-professor">Nome completo</label>
              <input type="text" id="nome-professor" placeholder="Digite o nome completo" />
            </div>

            <div>
              <label for="funcao-professor">Função</label>
              <input type="text" id="funcao-professor" placeholder="Ex.: Professora / Coordenação / Responsável" />
            </div>
          </div>

          <!-- Linha com turma e disciplina -->
          <div class="linha-campos">
            <div>
              <label for="turma-professor">Turma</label>
              <input type="text" id="turma-professor" placeholder="Ex.: Infantil A" />
            </div>

            <div>
              <label for="disciplina-professor">Disciplina</label>
              <select id="disciplina-professor">
                <option value="">Selecione a disciplina</option>
                <option value="NeuroTalk">NeuroTalk</option>
                <option value="NeuroPlay">NeuroPlay</option>
                <option value="NeuroMovi">NeuroMovi</option>
                <option value="NeuroBeat">NeuroBeat</option>
              </select>
            </div>
          </div>

          <!-- Linha com e-mail e telefone -->
          <div class="linha-campos">
            <div>
              <label for="email-professor">E-mail pessoal</label>
              <input type="email" id="email-professor" placeholder="email@exemplo.com" />
            </div>

            <div>
              <label for="telefone-professor">Telefone</label>
              <input type="text" id="telefone-professor" maxlength = 15 placeholder="Telefone ou WhatsApp" />
            </div>
          </div>

          <!-- Linha com perfil e status -->
          <div class="linha-campos">
            <div>
              <label for="perfil-professor">Perfil</label>
              <select id="perfil-professor">
                <option value="Professor">Professor</option>
                <option value="Coordenação">Coordenação</option>
                <option value="Pais">Pais</option>
              </select>
            </div>

            <div>
              <label for="status-professor">Status</label>
              <select id="status-professor">
                <option value="Ativo">Ativo</option>
                <option value="Em treinamento">Em treinamento</option>
                <option value="Inativo">Inativo</option>
              </select>
            </div>
          </div>

          <!-- Botões de ação do formulário -->
          <div class="acoes">
            <button type="button" class="btn btn-primario" id="btn-salvar-professor">Salvar usuário</button>
            <button type="button" class="btn btn-secundario" id="btn-limpar-professor">Limpar</button>
          </div>
        </form>
      </div>

      <!-- Tabela com a lista de usuários autorizados -->
      <div class="tabela-box">
        <h4>Usuários autorizados</h4>
        <div class="tabela-responsiva">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Função</th>
                <th>Turma</th>
                <th>Disciplina</th>
                <th>E-mail</th>
                <th>Perfil</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            
            <!-- Corpo da tabela preenchido dinamicamente pelo JavaScript -->
            <tbody id="lista-professores">
              <!-- preenchido via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Script responsável pela lógica do cadastro de usuários -->
  <script type="module" src="js/firebase-professores.js"></script>
</body>
</html>
